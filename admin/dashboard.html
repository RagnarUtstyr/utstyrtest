<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #111;
      color: #d6d6d6;
      margin: 0;
      padding: 0;
    }

    body::before {
      display: none;
    }

    header {
      max-width: 100%;
      padding: 20px 30px;
      box-sizing: border-box;
    }

    main.admin-main {
      max-width: 100%;
      padding: 20px 30px 40px;
      box-sizing: border-box;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .admin-topbar h1 {
      margin: 0;
      color: #ffcc00;
      font-size: 28px;
      text-align: left;
    }

    .admin-status {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .admin-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .admin-column {
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 0;
    }

    .admin-panel {
      background: #1a1a1a;
      border: 1px solid #2c2c2c;
      border-radius: 8px;
      padding: 18px;
      box-sizing: border-box;
    }

    .admin-panel h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      color: #fff;
      text-align: left;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 16px;
    }

    .admin-form-grid.full-width {
      grid-template-columns: 1fr;
    }

    .admin-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .admin-field.full {
      grid-column: 1 / -1;
    }

    .admin-field label {
      font-size: 13px;
      color: #bdbdbd;
      margin: 0;
    }

    .admin-field input,
    .admin-field textarea,
    .admin-field select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #101010;
      color: #fff;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }

    .admin-field textarea {
      resize: vertical;
      min-height: 90px;
    }

    .admin-field input:focus,
    .admin-field textarea:focus,
    .admin-field select:focus {
      outline: none;
      border-color: #666;
    }

    .admin-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 14px;
      color: #ddd;
    }

    .admin-checkbox input {
      width: auto;
      margin: 0;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .admin-button,
    .admin-button-secondary,
    .admin-button-danger {
      border: 1px solid #444;
      background: #222;
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }

    .admin-button:hover,
    .admin-button-secondary:hover,
    .admin-button-danger:hover {
      background: #2d2d2d;
    }

    .admin-button-danger {
      border-color: #5a2a2a;
    }

    .admin-list {
      display: grid;
      gap: 10px;
    }

    .admin-list-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 12px;
      align-items: center;
      background: #131313;
      border: 1px solid #262626;
      border-radius: 6px;
      padding: 10px;
    }

    .admin-list-item img {
      width: 90px;
      height: 70px;
      object-fit: cover;
      border-radius: 4px;
      background: #000;
    }

    .admin-list-meta {
      min-width: 0;
    }

    .admin-list-meta h3 {
      margin: 0 0 4px 0;
      font-size: 15px;
      color: #fff;
    }

    .admin-list-meta p {
      margin: 2px 0;
      font-size: 12px;
      color: #a8a8a8;
      line-height: 1.4;
    }

    .admin-list-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .admin-simple-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: #131313;
      border: 1px solid #262626;
      border-radius: 6px;
      padding: 10px;
    }

    .admin-simple-item h3 {
      margin: 0 0 4px 0;
      font-size: 15px;
      color: #fff;
    }

    .admin-simple-item p {
      margin: 2px 0;
      font-size: 12px;
      color: #a8a8a8;
    }

    .admin-muted {
      color: #999;
      font-size: 13px;
      margin: 0;
    }

    #auth-status,
    #save-status {
      margin: 0;
      font-size: 13px;
      color: #aaa;
    }

    @media (max-width: 1100px) {
      .admin-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .admin-form-grid {
        grid-template-columns: 1fr;
      }

      .admin-list-item {
        grid-template-columns: 1fr;
      }

      .admin-list-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="../index.html">
        <img src="../images/logo.png" alt="Logo" />
      </a>
    </div>

    <nav id="main-navbar"></nav>
  </header>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Admin Dashboard</h1>

      <div class="admin-status">
        <button id="admin-logout-button" class="admin-button-secondary">Log out</button>
        <p id="auth-status"></p>
        <p id="save-status"></p>
      </div>
    </div>

    <div class="admin-layout">
      <div class="admin-column">
        <section class="admin-panel">
          <h2 id="category-form-title">Add category</h2>

          <form id="category-form">
            <div class="admin-form-grid full-width">
              <div class="admin-field">
                <label for="categoryName">Category name</label>
                <input type="text" id="categoryName" required />
              </div>

              <div class="admin-field">
                <label for="categorySlug">Category slug</label>
                <input type="text" id="categorySlug" placeholder="camera" required />
              </div>

              <div class="admin-field">
                <label for="categorySortOrder">Sort order</label>
                <input type="number" id="categorySortOrder" min="0" value="0" />
              </div>

              <label class="admin-checkbox">
                <input type="checkbox" id="categoryActive" checked />
                Active
              </label>
            </div>

            <div class="admin-actions">
              <button type="submit" class="admin-button">Save category</button>
              <button type="button" id="cancel-category-edit-button" class="admin-button-secondary">Cancel</button>
            </div>
          </form>
        </section>

        <section class="admin-panel">
          <h2>Existing categories</h2>
          <div class="admin-list" id="admin-category-list"></div>
        </section>
      </div>

      <div class="admin-column">
        <section class="admin-panel">
          <h2 id="form-title">Add equipment</h2>

          <form id="equipment-form">
            <div class="admin-form-grid">
              <div class="admin-field">
                <label for="name">Name</label>
                <input type="text" id="name" required />
              </div>

              <div class="admin-field">
                <label for="shortTitle">Card title</label>
                <input type="text" id="shortTitle" required />
              </div>

              <div class="admin-field full">
                <label for="detailTitle">Detail page title</label>
                <input type="text" id="detailTitle" required />
              </div>

              <div class="admin-field">
                <label for="categorySlug">Category slug</label>
                <input type="text" id="categorySlug" placeholder="camera" required />
              </div>

              <div class="admin-field">
                <label for="imageUrl">Image path or URL</label>
                <input type="text" id="imageUrl" placeholder="/images/equipment/item.jpg" required />
              </div>

              <div class="admin-field">
                <label for="inventory">Inventory</label>
                <input type="number" id="inventory" min="0" value="1" />
              </div>

              <div class="admin-field">
                <label for="maxQuantity">Max quantity</label>
                <input type="number" id="maxQuantity" min="1" value="1" />
              </div>

              <div class="admin-field">
                <label for="rentalPrice">Rental price (NOK)</label>
                <input type="number" id="rentalPrice" min="0" step="1" />
              </div>

              <div class="admin-field">
                <label for="priceUnit">Price unit</label>
                <input type="text" id="priceUnit" placeholder="day / weekend / week" />
              </div>

              <div class="admin-field full">
                <label for="alt">Image alt text</label>
                <input type="text" id="alt" />
              </div>

              <div class="admin-field full">
                <label for="keywords">Keywords (one per line)</label>
                <textarea id="keywords" rows="5"></textarea>
              </div>

              <div class="admin-field full">
                <label for="description">Description paragraphs (one per line)</label>
                <textarea id="description" rows="6"></textarea>
              </div>

              <div class="admin-field full">
                <label for="specifications">Specifications (one per line, format: Label: Value)</label>
                <textarea id="specifications" rows="6"></textarea>
              </div>

              <label class="admin-checkbox">
                <input type="checkbox" id="active" checked />
                Active
              </label>
            </div>

            <div class="admin-actions">
              <button type="submit" class="admin-button">Save equipment</button>
              <button type="button" id="cancel-edit-button" class="admin-button-secondary">Cancel</button>
            </div>
          </form>
        </section>

        <section class="admin-panel">
          <h2>Existing equipment</h2>
          <div class="admin-list" id="admin-equipment-list"></div>
        </section>
      </div>
    </div>
  </main>

  <script type="module" src="../js/dynamic-navbar.js"></script>
  <script type="module" src="../js/admin-auth.js"></script>
  <script type="module" src="../js/admin-dashboard.js"></script>
</body>
</html>
