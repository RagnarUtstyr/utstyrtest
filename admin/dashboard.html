<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../style/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #111;
      color: #d6d6d6;
      margin: 0;
      padding: 0;
    }

    body::before { display: none; }

    header {
      max-width: 100%;
      padding: 20px 30px;
      box-sizing: border-box;
    }

    main.admin-main {
      max-width: 100%;
      padding: 20px 30px 40px;
      box-sizing: border-box;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .admin-topbar h1 {
      margin: 0;
      color: #ffcc00;
      font-size: 28px;
      text-align: left;
    }

    .admin-status {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .admin-layout {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 24px;
      align-items: start;
    }

    .admin-column {
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 0;
    }

    .admin-panel {
      background: #1a1a1a;
      border: 1px solid #2c2c2c;
      border-radius: 8px;
      padding: 18px;
      box-sizing: border-box;
    }

    .admin-panel h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      color: #fff;
      text-align: left;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 16px;
    }

    .admin-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .admin-field.full {
      grid-column: 1 / -1;
    }

    .admin-field label {
      font-size: 13px;
      color: #bdbdbd;
      margin: 0;
    }

    .admin-field input,
    .admin-field textarea,
    .admin-field select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #101010;
      color: #fff;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }

    .admin-field textarea {
      resize: vertical;
      min-height: 90px;
    }

    .admin-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 14px;
      color: #ddd;
    }

    .admin-checkbox input {
      width: auto;
      margin: 0;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .admin-button,
    .admin-button-secondary,
    .admin-button-danger {
      border: 1px solid #444;
      background: #222;
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }

    .admin-button:hover,
    .admin-button-secondary:hover,
    .admin-button-danger:hover {
      background: #2d2d2d;
    }

    .admin-button-danger {
      border-color: #5a2a2a;
    }

    .admin-list {
      display: grid;
      gap: 10px;
    }

    .admin-list-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 12px;
      align-items: center;
      background: #131313;
      border: 1px solid #262626;
      border-radius: 6px;
      padding: 10px;
    }

    .admin-list-item img {
      width: 90px;
      height: 70px;
      object-fit: cover;
      border-radius: 4px;
      background: #000;
    }

    .admin-list-meta h3 {
      margin: 0 0 4px 0;
      font-size: 15px;
      color: #fff;
    }

    .admin-list-meta p {
      margin: 2px 0;
      font-size: 12px;
      color: #a8a8a8;
      line-height: 1.4;
    }

    .admin-list-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .admin-category-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      background: #131313;
      border: 1px solid #262626;
      border-radius: 6px;
      padding: 10px;
    }

    .admin-category-item h3 {
      margin: 0 0 4px 0;
      font-size: 15px;
      color: #fff;
    }

    .admin-category-item p {
      margin: 0;
      font-size: 12px;
      color: #a8a8a8;
    }

    .admin-category-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .admin-sort-input {
      width: 84px;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #101010;
      color: #fff;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }

    .admin-muted {
      color: #999;
      font-size: 13px;
      margin: 0;
    }

    .admin-help {
      color: #999;
      font-size: 12px;
      margin: 0 0 10px 0;
      text-align: left;
    }

    .hidden {
      display: none !important;
    }

    .equipment-group {
      border: 1px solid #262626;
      border-radius: 8px;
      overflow: hidden;
      background: #131313;
    }

    .equipment-group-header {
      width: 100%;
      background: #181818;
      color: #fff;
      border: none;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      text-align: left;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
    }

    .equipment-group-header:hover {
      background: #202020;
    }

    .equipment-group-title {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .equipment-group-count {
      color: #aaa;
      font-size: 12px;
    }

    .equipment-group-chevron {
      font-size: 14px;
      color: #aaa;
    }

    .equipment-group-body {
      display: none;
      padding: 10px;
      gap: 10px;
      background: #131313;
    }

    .equipment-group.open .equipment-group-body {
      display: grid;
    }

    .admin-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      z-index: 9999;
    }

    .admin-modal.open {
      display: flex;
    }

    .admin-modal-dialog {
      width: min(900px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #171717;
      border: 1px solid #2c2c2c;
      border-radius: 10px;
      padding: 20px;
      box-sizing: border-box;
    }

    .admin-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .admin-modal-header h2 {
      margin: 0;
      color: #fff;
      font-size: 20px;
    }

    .admin-modal-close {
      border: 1px solid #444;
      background: #222;
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
    }

    .admin-search-wrap {
      margin-bottom: 14px;
    }

    .admin-search-input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #101010;
      color: #fff;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }

    .admin-search-input:focus {
      outline: none;
      border-color: #666;
    }

    .admin-list-item[draggable="true"],
    .admin-category-item[draggable="true"] {
      cursor: grab;
    }

    .admin-list-item.dragging,
    .admin-category-item.dragging {
      opacity: 0.45;
    }

    .admin-drop-target {
      outline: 1px dashed #ffcc00;
    }

    @media (max-width: 1100px) {
      .admin-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .admin-form-grid {
        grid-template-columns: 1fr;
      }

      .admin-list-item,
      .admin-category-item {
        grid-template-columns: 1fr;
      }

      .admin-list-actions,
      .admin-category-controls {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="../index.html">
        <img src="../images/logo.png" alt="Logo" />
      </a>
    </div>

    <div id="search-bar-container">
      <input type="text" id="global-search-field" placeholder="Search" autocomplete="off">
      <div id="dropdown-results" class="dropdown-results"></div>
    </div>

    <nav id="main-navbar"></nav>
  </header>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Admin Dashboard</h1>

      <div class="admin-status">
        <button id="clear-all-equipment-button" class="admin-button-danger">Clear all equipment</button>
        <button id="admin-logout-button" class="admin-button-secondary">Log out</button>
        <p id="save-status"></p>
      </div>
    </div>

    <div class="admin-layout">
      <div class="admin-column">
        <section class="admin-panel">
          <h2>Add equipment</h2>

          <form id="equipment-form">
            <div class="admin-form-grid">
              <div class="admin-field">
                <label for="name">Name</label>
                <input type="text" id="name" required />
              </div>

              <div class="admin-field">
                <label for="categorySelect">Category</label>
                <select id="categorySelect" required>
                  <option value="">Select category</option>
                  <option value="__new__">Create new category</option>
                </select>
              </div>

              <div class="admin-field hidden" id="newCategoryNameField">
                <label for="newCategoryName">New category name</label>
                <input type="text" id="newCategoryName" />
              </div>

              <div class="admin-field hidden" id="newCategorySlugField">
                <label for="newCategorySlug">New category slug</label>
                <input type="text" id="newCategorySlug" placeholder="camera" />
              </div>

              <div class="admin-field">
                <label for="imageName">Image name</label>
                <input type="text" id="imageName" required />
              </div>

              <div class="admin-field">
                <label for="inventory">Inventory</label>
                <input type="number" id="inventory" min="0" value="1" />
              </div>

              <div class="admin-field">
                <label for="rentalPrice">Rental price (NOK)</label>
                <input type="number" id="rentalPrice" min="0" step="1" />
              </div>

              <div class="admin-field full">
                <label for="keywords">Keywords (one per line)</label>
                <textarea id="keywords" rows="5"></textarea>
              </div>

              <div class="admin-field full">
                <label for="description">Description paragraphs (one per line)</label>
                <textarea id="description" rows="6"></textarea>
              </div>

              <div class="admin-field full">
                <label for="specifications">Specifications (one per line, format: Label: Value)</label>
                <textarea id="specifications" rows="6"></textarea>
              </div>

              <label class="admin-checkbox">
                <input type="checkbox" id="active" checked />
                Active
              </label>
            </div>

            <div class="admin-actions">
              <button type="submit" class="admin-button">Save equipment</button>
              <button type="button" id="cancel-edit-button" class="admin-button-secondary">Cancel</button>
            </div>
          </form>
        </section>

        <section class="admin-panel">
          <h2>Categories</h2>
          <p class="admin-help">Drag categories to reorder them. The number field still works as a manual backup.</p>
          <div class="admin-list" id="admin-category-list"></div>
        </section>
      </div>

      <div class="admin-column">
        <section class="admin-panel">
          <h2>Existing equipment</h2>
          <div class="admin-search-wrap">
            <input type="text" id="admin-equipment-search" class="admin-search-input" placeholder="Search equipment by name, category, or keyword">
          </div>
          <div class="admin-list" id="admin-equipment-list"></div>
        </section>
      </div>
    </div>
  </main>

  <div class="admin-modal" id="edit-equipment-modal" aria-hidden="true">
    <div class="admin-modal-dialog">
      <div class="admin-modal-header">
        <h2>Edit equipment</h2>
        <button class="admin-modal-close" id="close-edit-modal-button" type="button">×</button>
      </div>

      <form id="edit-equipment-form">
        <div class="admin-form-grid">
          <div class="admin-field">
            <label for="edit-name">Name</label>
            <input type="text" id="edit-name" required />
          </div>

          <div class="admin-field">
            <label for="edit-categorySelect">Category</label>
            <select id="edit-categorySelect" required>
              <option value="">Select category</option>
              <option value="__new__">Create new category</option>
            </select>
          </div>

          <div class="admin-field hidden" id="edit-newCategoryNameField">
            <label for="edit-newCategoryName">New category name</label>
            <input type="text" id="edit-newCategoryName" />
          </div>

          <div class="admin-field hidden" id="edit-newCategorySlugField">
            <label for="edit-newCategorySlug">New category slug</label>
            <input type="text" id="edit-newCategorySlug" placeholder="camera" />
          </div>

          <div class="admin-field">
            <label for="edit-imageName">Image name</label>
            <input type="text" id="edit-imageName" required />
          </div>

          <div class="admin-field">
            <label for="edit-inventory">Inventory</label>
            <input type="number" id="edit-inventory" min="0" value="1" />
          </div>

          <div class="admin-field">
            <label for="edit-rentalPrice">Rental price (NOK)</label>
            <input type="number" id="edit-rentalPrice" min="0" step="1" />
          </div>

          <div class="admin-field full">
            <label for="edit-keywords">Keywords (one per line)</label>
            <textarea id="edit-keywords" rows="5"></textarea>
          </div>

          <div class="admin-field full">
            <label for="edit-description">Description paragraphs (one per line)</label>
            <textarea id="edit-description" rows="6"></textarea>
          </div>

          <div class="admin-field full">
            <label for="edit-specifications">Specifications (one per line, format: Label: Value)</label>
            <textarea id="edit-specifications" rows="6"></textarea>
          </div>

          <label class="admin-checkbox">
            <input type="checkbox" id="edit-active" checked />
            Active
          </label>
        </div>

        <div class="admin-actions">
          <button type="submit" class="admin-button">Save changes</button>
          <button type="button" id="cancel-edit-modal-button" class="admin-button-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/basket.js"></script>
  <script type="module" src="../js/search.js"></script>
  <script type="module" src="../js/dynamic-navbar.js"></script>
  <script type="module" src="../js/admin-auth.js"></script>
  <script type="module" src="../js/admin-dashboard.js"></script>
</body>
</html>
