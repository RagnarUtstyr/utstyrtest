<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import Equipment JSON</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
    }

    h1, h2 {
      color: #ffcc00;
      margin-top: 0;
    }

    .panel {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      color: #bbb;
    }

    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #101010;
      color: #fff;
    }

    textarea {
      min-height: 260px;
      resize: vertical;
    }

    button {
      width: auto;
      cursor: pointer;
      background: #222;
      margin-right: 10px;
      margin-top: 10px;
    }

    button:hover {
      background: #2d2d2d;
    }

    .actions {
      margin-top: 10px;
    }

    #result {
      white-space: pre-wrap;
      background: #101010;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 4px;
      min-height: 100px;
    }

    .top-links {
      margin-bottom: 20px;
    }

    .top-links a {
      color: #ffcc00;
      text-decoration: none;
      margin-right: 14px;
    }
  </style>
</head>
<body>
  <div class="top-links">
    <a href="/utstyrtest/index.html">Home</a>
    <a href="/utstyrtest/admin/dashboard.html">Dashboard</a>
  </div>

  <h1>Import Equipment JSON</h1>

  <div class="panel">
    <h2>Import source</h2>

    <label for="jsonFile">JSON file</label>
    <input type="file" id="jsonFile" accept=".json,application/json" />

    <label for="jsonInput">JSON content</label>
    <textarea id="jsonInput" placeholder='Paste JSON array here'></textarea>

    <label for="importMode">Import mode</label>
    <select id="importMode">
      <option value="upsert">Upsert by slug</option>
      <option value="createOnly">Create only</option>
    </select>

    <div class="actions">
      <button id="loadFileButton" type="button">Load file</button>
      <button id="validateJsonButton" type="button">Validate</button>
      <button id="importJsonButton" type="button">Import</button>
    </div>
  </div>

  <div class="panel">
    <h2>Result</h2>
    <div id="result">No action yet.</div>
  </div>

  <script type="module" src="../js/admin-import.js"></script>
</body>
</html>
